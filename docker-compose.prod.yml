# Production docker-compose configuration
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  entsoe-ote-data-uploader:
    shm_size: '512m'
    # Remove extra_hosts in production (override to empty)
    extra_hosts: []
    environment:
      - SENTRY_DSN=https://cd4fe0c0bd2b15283870e65cb8767b64@o55091.ingest.us.sentry.io/4510815645925376
    # Join the same network as your database container
    networks:
      - shared_network

# Use the same network as your PostgreSQL container
# If your database is on an existing network, set external: true
# and update the network name to match
networks:
  shared_network:
    external: true
